      document.documentElement.lang='es';
      document.documentElement.setAttribute('data-lang-swap','1');
    }
  }catch(e){}
</script>

<style>
  /* ---------- THEME TOKENS (mirrors homepage) ---------- */
  :root{
    --ink:#0a0b0d; --ink-2:#0e1014; --panel:#14171c; --panel-2:#191d23;
    --line:rgba(255,255,255,.09); --line-strong:rgba(255,255,255,.16);
    --text:#ece9e1; --muted:#8b9099; --muted-2:#5f646d;
    --accent:#ffb02e; --on-accent:#1a1206; --live:#5fd17a;
    --glow:rgba(255,176,46,.14); --grid-op:.55;
    --serif:"Fraunces",Georgia,serif; --sans:"Hanken Grotesk",system-ui,sans-serif; --mono:"JetBrains Mono",ui-monospace,monospace;
  }
  html[data-theme="light"]{
    --ink:#f5f2ea; --ink-2:#efebe0; --panel:#fffdf8; --panel-2:#faf6ec;
    --line:rgba(22,24,28,.10); --line-strong:rgba(22,24,28,.20);
    --text:#181a1e; --muted:#5b606a; --muted-2:#a2a6ad;
    --accent:#b56b00; --on-accent:#fffaf0; --live:#1f9d4d;
    --glow:rgba(181,107,0,.10); --grid-op:.6;
  }
  @media (prefers-color-scheme: light){
    html:not([data-theme="dark"]):not([data-theme="light"]){
      --ink:#f5f2ea; --ink-2:#efebe0; --panel:#fffdf8; --panel-2:#faf6ec;
      --line:rgba(22,24,28,.10); --line-strong:rgba(22,24,28,.20);
      --text:#181a1e; --muted:#5b606a; --muted-2:#a2a6ad;
      --accent:#b56b00; --on-accent:#fffaf0; --live:#1f9d4d;
      --glow:rgba(181,107,0,.10);
    }
  }

  html[data-lang-swap] body{visibility:hidden}

  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  html{scroll-behavior:smooth}
  body{background:var(--ink);color:var(--text);font-family:var(--sans);font-size:17px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;transition:background .4s,color .4s;display:flex;flex-direction:column;min-height:100vh}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:64px 64px;
    -webkit-mask-image:radial-gradient(ellipse 80% 60% at 50% 0%,#000 0%,transparent 75%);
    mask-image:radial-gradient(ellipse 80% 60% at 50% 0%,#000 0%,transparent 75%);opacity:var(--grid-op)}
  body::after{content:"";position:fixed;top:-30%;left:50%;transform:translateX(-50%);width:90vw;height:70vh;z-index:0;pointer-events:none;
    background:radial-gradient(circle,var(--glow),transparent 60%);filter:blur(20px)}
  .wrap{max-width:1140px;margin:0 auto;padding:0 28px;position:relative;z-index:1;width:100%}

  .tag{font-family:var(--mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}

  /* NAV — identical to homepage */
  nav{position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);background:color-mix(in srgb,var(--ink) 72%,transparent);border-bottom:1px solid var(--line)}
  .nav-in{display:flex;align-items:center;justify-content:space-between;height:66px;gap:14px}
  .brand{font-family:var(--mono);font-weight:600;font-size:15px;letter-spacing:.02em;display:flex;align-items:center;gap:9px;flex-shrink:0}
  .brand a{color:inherit;text-decoration:none;display:inline-flex;gap:6px}
  .brand b{color:var(--accent)}
  .nav-links{display:flex;gap:22px;align-items:center;flex-wrap:nowrap}
  .nav-links a{color:var(--muted);text-decoration:none;font-size:14.5px;font-weight:500;transition:color .2s;white-space:nowrap}
  .nav-links a:hover{color:var(--text)}
  .pill{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12px;color:var(--text);border:1px solid var(--line-strong);border-radius:100px;padding:7px 14px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--live);animation:pulse 2.4s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(95,209,122,.5)}70%{box-shadow:0 0 0 7px rgba(95,209,122,0)}100%{box-shadow:0 0 0 0 rgba(95,209,122,0)}}
  .icon-btn{display:inline-flex;align-items:center;justify-content:center;height:38px;border-radius:10px;border:1px solid var(--line-strong);background:transparent;color:var(--text);cursor:pointer;transition:border-color .2s,color .2s;flex-shrink:0}
  .icon-btn:hover{border-color:var(--accent);color:var(--accent)}
  .theme-toggle{width:38px}
  .theme-toggle svg{width:18px;height:18px}
  .theme-toggle .ico-sun{display:none}
  html[data-theme="light"] .theme-toggle .ico-sun{display:block}
  html[data-theme="light"] .theme-toggle .ico-moon{display:none}
  @media (prefers-color-scheme: light){html:not([data-theme="dark"]) .theme-toggle .ico-sun{display:block}html:not([data-theme="dark"]) .theme-toggle .ico-moon{display:none}}
  .lang-toggle{padding:0 12px;font-family:var(--mono);font-size:12px;letter-spacing:.06em;font-weight:600;color:var(--muted);gap:2px}
  .lang-toggle .lang-code{color:var(--muted);transition:color .2s}
  .lang-toggle .lang-code.active{color:var(--accent)}
  .lang-toggle .lang-sep{color:var(--muted-2);margin:0 4px}
  .lang-toggle:hover{color:var(--text)}

  /* BUTTONS — identical to homepage */
  .btn{font-family:var(--sans);font-weight:600;font-size:15px;text-decoration:none;padding:14px 26px;border-radius:10px;transition:transform .15s,filter .2s,border-color .2s,color .2s;display:inline-flex;align-items:center;gap:9px}
  .btn-primary{background:var(--accent);color:var(--on-accent)}
  .btn-primary:hover{transform:translateY(-2px);filter:brightness(1.08)}
  .btn-ghost{color:var(--text);border:1px solid var(--line-strong)}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent)}

  /* 404 LAYOUT */
  main.notfound{flex:1;display:flex;align-items:center;justify-content:center;padding:72px 0 96px;text-align:center}
  .nf-eyebrow{display:inline-flex;align-items:center;gap:10px;margin-bottom:28px}
  .nf-eyebrow .dot{background:var(--accent);animation:none}
  .nf-code{font-family:var(--serif);font-weight:500;font-size:clamp(110px,22vw,220px);line-height:.92;letter-spacing:-.04em;margin:0 auto 8px;display:inline-block}
  .nf-code em{font-style:italic;color:var(--accent)}
  .nf-sub{font-family:var(--serif);font-weight:500;font-size:clamp(26px,4vw,42px);letter-spacing:-.015em;margin:18px 0 22px;line-height:1.1}
  .nf-lede{font-size:clamp(17px,2vw,19px);color:var(--muted);max-width:560px;margin:0 auto 38px;line-height:1.55}
  .nf-lede strong{color:var(--text);font-weight:600}
  .nf-cta{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}

  /* FOOTER — identical to homepage */
  footer{border-top:1px solid var(--line);padding:36px 0;color:var(--muted-2);font-size:13px;font-family:var(--mono);position:relative;z-index:1}
  .foot-in{display:flex;justify-content:space-between;flex-wrap:wrap;gap:14px}
  .foot-in a{color:var(--muted);text-decoration:none}
  .foot-in a:hover{color:var(--accent)}

  /* RESPONSIVE — matches homepage breakpoints */
  @media(max-width:1024px){.nav-links{gap:18px}}
  @media(max-width:760px){.nav-links a:not(.pill){display:none}}
  @media(max-width:560px){
    .wrap{padding:0 18px}
    .pill{display:none}
    .nav-links{gap:10px}
    .lang-toggle{padding:0 10px}
    main.notfound{padding:48px 0 72px}
    .nf-cta .btn{flex:1;justify-content:center;min-width:160px}
  }
</style>
</head>
<body>

<nav>
  <div class="wrap nav-in">
    <div class="brand"><a href="/">Oleksandr <b>Bashkev</b></a></div>
    <div class="nav-links">
      <a href="/#work" data-i18n="navWork">Work</a>

      <a href="/#demos" data-i18n="navDemos">Demos</a>

      </button>

<main class="notfound">
  <div class="wrap">
    <div class="nf-eyebrow"><span class="tag" data-i18n="eyebrow">// Error</span></div>
    <h1 class="nf-code">4<em>0</em>4</h1>
    <h2 class="nf-sub" data-i18n="sub">Page not found</h2>

  </div>

<script>
  /* standalone i18n — no dependency on index.html */
  const STR = {
    en: {
      title: "404 — Page Not Found · Oleksandr Bashkev",
      desc: "The page you were looking for doesn't exist.",
      navWork: "Work",
      navCoast: "Coast",
      navDemos: "Demos",
      navServices: "Services",
      navStack: "Stack",
      openToWork: "Open to work",
      eyebrow: "// Error",
      sub: "Page not found",
      lede: "The page you were looking for doesn't exist, was moved, or never lived here. Let's head back to <strong>firmer ground.</strong>",
      ctaHome: "← Back home",
      ctaContact: "Get in touch",
      themeToggleLabel: "Toggle light / dark theme",
      langToggleLabel: "Switch language English / Spanish"
    },
    es: {
      title: "404 — Página no encontrada · Oleksandr Bashkev",
      desc: "La página que buscabas no existe.",
      navWork: "Proyectos",
      navCoast: "Costa",
      navDemos: "Demos",
      navServices: "Servicios",
      navStack: "Stack",
      openToWork: "Disponible",
      eyebrow: "// Error",
      sub: "Página no encontrada",
      lede: "La página que buscabas no existe, se ha movido o nunca vivió aquí. Volvamos a <strong>terreno firme.</strong>",
      ctaHome: "← Volver al inicio",
      ctaContact: "Contacto",
      themeToggleLabel: "Cambiar tema claro / oscuro",
      langToggleLabel: "Cambiar idioma inglés / español"
    }
  };

  const root=document.documentElement;

  /* theme toggle */
  document.getElementById('themeBtn').addEventListener('click',()=>{
    const current=root.getAttribute('data-theme')
      || (matchMedia('(prefers-color-scheme: light)').matches ? 'light':'dark');
    const next=current==='light'?'dark':'light';
    root.setAttribute('data-theme',next);
    try{localStorage.setItem('theme',next)}catch(e){}
  });

  /* language toggle */
  const langBtn=document.getElementById('langBtn');

  function applyLang(lang){
    if(!STR[lang]) lang='en';
    const dict=STR[lang];
    root.lang=lang;

    document.querySelectorAll('[data-i18n]').forEach(el=>{
      const k=el.getAttribute('data-i18n');
      if(dict[k]!==undefined) el.textContent=dict[k];
    });
    document.querySelectorAll('[data-i18n-html]').forEach(el=>{
      const k=el.getAttribute('data-i18n-html');
      if(dict[k]!==undefined) el.innerHTML=dict[k];
    });
    document.querySelectorAll('[data-i18n-label]').forEach(el=>{
      const k=el.getAttribute('data-i18n-label');
      if(dict[k]!==undefined) el.setAttribute('aria-label',dict[k]);
    });

    if(dict.title) document.title=dict.title;
    const md=document.querySelector('meta[name="description"]');
    if(md&&dict.desc) md.setAttribute('content',dict.desc);

    langBtn.querySelectorAll('.lang-code').forEach(sp=>{
      sp.classList.toggle('active', sp.getAttribute('data-lang')===lang);
    });

    try{localStorage.setItem('lang',lang)}catch(e){}
    root.removeAttribute('data-lang-swap');
  }

  const savedLang=(function(){try{return localStorage.getItem('lang')}catch(e){return null}})()||'en';
  applyLang(savedLang);

  langBtn.addEventListener('click',()=>{
    const cur=root.lang==='es'?'es':'en';
    applyLang(cur==='en'?'es':'en');
  });
</script>
</body>
